<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ تحذير أمني خطير</title>
    <style>
        body { background: #ff0000; color: white; text-align: center; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        h1 { font-size: 50px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .troll-img { width: 250px; border-radius: 50%; border: 10px solid white; margin: 20px; }
        p { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🚨 تــــــــم كشفك! 🚨</h1>
    <img src="https://media.tenor.com/x8v1oNU1SgNAAAAd/troll-face.gif" class="troll-img">
    <p>لقد ضغطت على الرابط بدافع الفضول.. أنت الآن "ضحية اليوم"!</p>
    <p style="font-size: 15px;">(سيتم إرسال تنبيه لكل أصدقائك أنك تحب الفضائح.. أمزح فقط 😂)</p>
    
    <script>
        // خدعة بسيطة لمنعهم من إغلاق الصفحة بسهولة
        window.onbeforeunload = function() {
            return "هل أنت متأكد؟ الفضيحة ستستمر!";
        };
    </script>
</body>
</html>
